apiVersion: apps/v1
kind: Deployment
metadata:
  name: poc-devops
  namespace: poc
  labels:
    app: poc-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poc-devops
  template:
    metadata:
      labels:
        app: poc-devops
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: poc-devops
          image: 192.168.1.X:30002/poc/poc-devops:IMAGE_TAG
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "IMAGE_TAG"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
